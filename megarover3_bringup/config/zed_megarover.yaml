zed_node:
  ros__parameters:
    pos_tracking:
      pos_tracking_enabled: true
      odometry_frame: 'zed_odom'   # wheel odom の 'odom' と分離
      map_frame: 'zed_map'
      two_d_mode: true              # 地上ロボットなので平面拘束
      imu_fusion: true
      publish_tf: true
      publish_map_tf: false
      set_gravity_as_origin: true
      initial_base_pose: [0.0, 0.0, 1.20, 0.0, 0.0, 0.0]  # 車輪軸から1.13m上 (base_link z=1.20m)
