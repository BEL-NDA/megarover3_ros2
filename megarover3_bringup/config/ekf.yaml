ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: true
    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    # 車輪エンコーダ由来のraw odom: vx と vyaw を使用
    # /odom はこのEKFの出力だけにするため、pub_odom は /wheel/odom に出します。
    odom0: /wheel/odom
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  false, false,
                   false, false, true,
                   false, false, false]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 10

    # ZED visual odom: yaw only.
    # ZED x/y can jump or over-constrain the filter against wheel odom, so
    # keep translation on /wheel/odom and use ZED only to stabilize heading.
    odom1: /zed/zed_node/odom
    odom1_config: [false, false, false,
                   false, false, true,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom1_differential: false
    odom1_relative: true
    odom1_queue_size: 10
    odom1_pose_rejection_threshold: 0.8
